<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Radiating Text</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
}

canvas {
    display: block;
    width: 100vw;
    height: 100vh;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const text = "En nyt ole niinkään varma asiasta.";

let particles = [];
let textImage;
let textX, textY, fontSize;

function resize() {
    const dpr = window.devicePixelRatio || 1;

    canvas.width = innerWidth * dpr;
    canvas.height = innerHeight * dpr;

    canvas.style.width = innerWidth + "px";
    canvas.style.height = innerHeight + "px";

    ctx.setTransform(dpr,0,0,dpr,0,0);

    fontSize = Math.min(innerWidth * 0.06, innerHeight * 0.12);
    if(fontSize < 26) fontSize = 26;

    buildTextMask();
}

window.addEventListener("resize", resize);

function buildTextMask() {

    particles = [];

    const off = document.createElement("canvas");
    off.width = innerWidth;
    off.height = innerHeight;
    const octx = off.getContext("2d");

    octx.fillStyle = "white";
    octx.textAlign = "center";
    octx.textBaseline = "middle";
    octx.font = `italic ${fontSize}px Georgia, "Times New Roman", serif`;

    textX = innerWidth / 2;
    textY = innerHeight / 2;

    octx.fillText(text, textX, textY);

    textImage = octx.getImageData(0,0,off.width,off.height);

    const img = textImage.data;

    const step = 2;

    for(let y=1;y<off.height-1;y+=step){
        for(let x=1;x<off.width-1;x+=step){

            const i = (y*off.width+x)*4;

            if(img[i+3] > 10){

                let edge = false;

                for(let yy=-1; yy<=1 && !edge; yy++){
                    for(let xx=-1; xx<=1; xx++){

                        const ni=((y+yy)*off.width+(x+xx))*4;

                        if(img[ni+3] < 10){
                            edge = true;
                            break;
                        }
                    }
                }

                if(edge && Math.random() < 0.16){

                    const angle = Math.random()*Math.PI*2;

                    particles.push({
                        x,
                        y,
                        baseX:x,
                        baseY:y,
                        angle,
                        distance:Math.random()*10+2,
                        speed:0.3+Math.random()*0.8,
                        phase:Math.random()*Math.PI*2,
                        size:Math.random()*1.2+0.3,
                        alpha:0.2+Math.random()*0.8
                    });
                }
            }
        }
    }
}

let t = 0;

function animate(){

    t += 0.02;

    ctx.fillStyle="black";
    ctx.fillRect(0,0,innerWidth,innerHeight);

    ctx.save();

    ctx.textAlign="center";
    ctx.textBaseline="middle";
    ctx.font=`italic ${fontSize}px Georgia, "Times New Roman", serif`;

    // Soft glow
    ctx.shadowBlur=20;
    ctx.shadowColor="white";
    ctx.fillStyle="white";
    ctx.fillText(text,textX,textY);

    ctx.restore();

    for(const p of particles){

        const d = (Math.sin(t*p.speed+p.phase)+1)/2;

        const ox = Math.cos(p.angle)*p.distance*d;
        const oy = Math.sin(p.angle)*p.distance*d;

        ctx.globalAlpha = p.alpha*(0.25+d*0.75);

        ctx.beginPath();
        ctx.arc(
            p.baseX+ox,
            p.baseY+oy,
            p.size,
            0,
            Math.PI*2
        );
        ctx.fillStyle="white";
        ctx.fill();
    }

    ctx.globalAlpha=1;

    requestAnimationFrame(animate);
}

resize();
animate();
</script>

</body>
</html>
